name: Build and Deploy (Docker + SSH)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint (TypeScript)
        run: npm run lint

  docker_build_push:
    runs-on: ubuntu-latest
    needs: lint
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/seeknirvana/seek-nirvana-webapp
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production
            PORT=3000
            NEXT_PUBLIC_REOWN_PROJECT_ID=${{ secrets.NEXT_PUBLIC_REOWN_PROJECT_ID }}
            NEXT_PUBLIC_PROJECT_ID=${{ secrets.NEXT_PUBLIC_REOWN_PROJECT_ID }}
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_ENABLE_GOOGLE_FIT=${{ secrets.NEXT_PUBLIC_ENABLE_GOOGLE_FIT }}
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            GOOGLE_FIT_ENCRYPTION_KEY=${{ secrets.GOOGLE_FIT_ENCRYPTION_KEY }}
            GOOGLE_OAUTH_CLIENT_ID=${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
            GOOGLE_OAUTH_CLIENT_SECRET=${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
            GOOGLE_OAUTH_REDIRECT_URI=${{ secrets.GOOGLE_OAUTH_REDIRECT_URI }}
            GOOGLE_FIT_SCOPES=${{ secrets.GOOGLE_FIT_SCOPES }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            RESEND_FROM_EMAIL=${{ secrets.RESEND_FROM_EMAIL }}

  deploy:
    runs-on: ubuntu-latest
    needs: docker_build_push
    environment: prod

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
            set -euxo pipefail

            IMAGE="ghcr.io/seeknirvana/seek-nirvana-webapp:latest"
            CONTAINER="seek-nirvana-webapp"

            # login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # pull latest image
            docker pull "$IMAGE"

            # create env file (server-side secrets + public vars)
            mkdir -p /opt/seek-nirvana-webapp

            cat <<EOF > /opt/seek-nirvana-webapp/.env
            NODE_ENV=production
            PORT=3000
            NEXT_PUBLIC_REOWN_PROJECT_ID=${{ secrets.NEXT_PUBLIC_REOWN_PROJECT_ID }}
            NEXT_PUBLIC_PROJECT_ID=${{ secrets.NEXT_PUBLIC_REOWN_PROJECT_ID }}
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_ENABLE_GOOGLE_FIT=${{ secrets.NEXT_PUBLIC_ENABLE_GOOGLE_FIT }}
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            GOOGLE_FIT_ENCRYPTION_KEY=${{ secrets.GOOGLE_FIT_ENCRYPTION_KEY }}
            GOOGLE_OAUTH_CLIENT_ID=${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
            GOOGLE_OAUTH_CLIENT_SECRET=${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
            GOOGLE_OAUTH_REDIRECT_URI=${{ secrets.GOOGLE_OAUTH_REDIRECT_URI }}
            GOOGLE_FIT_SCOPES=${{ secrets.GOOGLE_FIT_SCOPES }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            RESEND_FROM_EMAIL=${{ secrets.RESEND_FROM_EMAIL }}
            EOF
            chmod 600 /opt/seek-nirvana-webapp/.env

            # remove old container if exists
            if docker ps -a --format '{{.Names}}' | grep -q "^${CONTAINER}$"; then
              docker rm -f "$CONTAINER"
            fi

            # ensure traefik network exists
            docker network inspect traefik >/dev/null 2>&1 || docker network create traefik

            # run container
            docker run -d \
              --name "$CONTAINER" \
              --restart unless-stopped \
              --network traefik \
              -p 3001:3000 \
              --env-file /opt/seek-nirvana-webapp/.env \
              "$IMAGE"

            # cleanup
            docker image prune -f >/dev/null 2>&1 || true

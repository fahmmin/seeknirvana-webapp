name: Build and Deploy (Docker + SSH)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Install pnpm (required by test scripts)
        run: npm install -g pnpm

      - name: Lint (TypeScript)
        run: npm run lint

      - name: Tests
        run: npm test

      - name: Build Next.js app
        env:
          NEXT_PUBLIC_REOWN_PROJECT_ID: ${{ vars.NEXT_PUBLIC_REOWN_PROJECT_ID }}
          NEXT_PUBLIC_PROJECT_ID: ${{ vars.NEXT_PUBLIC_REOWN_PROJECT_ID }}
        run: npm run build

  docker_build_push:
    runs-on: ubuntu-latest
    needs: build
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/seek-nirvana-webapp
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: docker_build_push

    steps:
      - name: Deploy on custom server (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
            set -euo pipefail

            IMAGE="ghcr.io/${{ github.repository_owner }}/seek-nirvana-webapp:latest"
            CONTAINER="seek-nirvana-webapp"

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker pull "$IMAGE"

            if docker ps -a --format '{{.Names}}' | grep -q "^${CONTAINER}$"; then
              docker rm -f "$CONTAINER"
            fi

            if [ -f "/opt/seek-nirvana-webapp/.env" ]; then
              ENV_FILE_FLAG="--env-file /opt/seek-nirvana-webapp/.env"
            else
              ENV_FILE_FLAG=""
            fi

            docker run -d \
              --name "$CONTAINER" \
              --restart unless-stopped \
              -p 3000:3000 \
              $ENV_FILE_FLAG \
              "$IMAGE"

            docker image prune -f >/dev/null 2>&1 || true